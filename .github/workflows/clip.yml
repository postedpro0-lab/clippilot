name: ClipPilot

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # so it can commit state/seen.json and publish clips

concurrency:
  group: clippilot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run ClipPilot
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          SNAPCHAT_ACCESS_TOKEN: ${{ secrets.SNAPCHAT_ACCESS_TOKEN }}
          SNAPCHAT_PROFILE_ID: ${{ secrets.SNAPCHAT_PROFILE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python run.py

      - name: Upload clips as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clips-${{ github.run_number }}
          path: work/**/*.mp4
          if-no-files-found: ignore   # runs that make nothing won't fail
          retention-days: 14          # auto-deleted after 2 weeks (keeps storage tiny)

      - name: Persist "seen" state
        if: always()
        run: |
          git config user.name  "clippilot-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/seen.json || true
          git commit -m "Update seen state [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"
