# ============================================================
#  ClipPilot config — edit this, commit it, you're done.
# ============================================================

# =====================  CHANNELS  ===========================
# The YouTube channels you are approved/licensed to clip.
# Add as many as you want. Each line can be a @handle, a full channel URL,
# or a raw channel_id (UC...). They're resolved automatically at runtime —
# no separate script step needed.
#
# Each channel's clips land in their own folder: work/<channel>/...
channels:
  - "@foxsports"
  - "@fifa"
  - "@Foxsoccer"
# ============================================================

# ---- Source selection --------------------------------------
# Only clip long-form videos; skip Shorts. Videos shorter than this (seconds)
# are treated as Shorts and ignored. Long videos get sliced into many clips.
min_source_seconds: 90

# ---- Clipping behavior -------------------------------------
# Clips are variable length, cut on natural boundaries (speech pauses, or visual
# scene changes for silent footage) so they never break mid-action.
max_clip_seconds: 60            # a clip can be up to this long (must stay < 60)
min_clip_seconds: 4             # drop moments shorter than this (keeps short plays, skips blips)
max_clips_per_video: 10         # how many clips to make per long video

# A clip ends only when the ACTION is over, not at every sentence/scene change:
moment_pause_seconds: 1.5       # a commentary pause this long = "moment over"
scene_quiet_seconds: 3.0        # a calm shot this long (no scene change) = "action settled"

# 9:16 output size (don't change unless you know why)
out_width: 1080
out_height: 1920

# ---- Transcription (local, free) ---------------------------
whisper_model: "base"           # tiny | base | small | medium  (bigger = slower, better)
whisper_language: "en"          # set "" for auto-detect

# ---- First run safety --------------------------------------
# false = on the very first run, mark all existing videos as "seen" and make
#         nothing (so you don't clip the entire back catalog at once).
# true  = process the most recent upload on first run too.
process_backlog: true

# ---- Posting -----------------------------------------------
# Turn each platform on/off. Credentials live in GitHub Secrets / .env,
# never in this file.
post_to:
  youtube: true
  instagram: true
  tiktok: false                 # leave false until your TikTok app is approved (see README)
  snapchat: false               # leave false until your Snapchat Public Profile is approved (see README)

# For Snapchat: "SPOTLIGHT" (TikTok-style feed) or "STORY" (24h)
snapchat_target: "SPOTLIGHT"

# Caption + hashtags for the posts
caption_template: "{title} 🔥 #shorts #viral #fyp"
extra_hashtags: ["#clips", "#trending"]

# Space posts out so platforms don't flag you as spam (seconds between posts)
post_spacing_seconds: 90
